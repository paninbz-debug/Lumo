name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-unit:
    name: Typecheck + Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prod=false
      - run: pnpm typecheck
      - run: pnpm test

  e2e-critical:
    name: Playwright @critical
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: typecheck-and-unit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prod=false
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run @critical landing flow
        run: pnpm test:e2e:critical
        env:
          CI: "1"
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
